name: dotnet package

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dotnet-version: '8.0.x'
            framework: net8.0
          - dotnet-version: '10.0.x'
            framework: net10.0

    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET Core SDK ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Install dependencies
        run: dotnet restore -p:TargetFramework=${{ matrix.framework }}
      - name: Build
        run: dotnet build --configuration Release --no-restore -p:TargetFramework=${{ matrix.framework }}
      - name: Test
        run: dotnet test --no-restore --verbosity minimal --framework ${{ matrix.framework }}
